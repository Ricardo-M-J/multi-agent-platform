# LLM Model Configuration
# All models use OpenAI-compatible API format via LiteLLM

models:
  kimi:
    provider: "openai"
    api_base: "https://api.moonshot.cn/v1"
    api_key_env: "MOONSHOT_API_KEY"
    models:
      default: "moonshot-v1-128k"
      fast: "moonshot-v1-8k"

  deepseek:
    provider: "deepseek"
    api_base: "https://api.deepseek.com"
    api_key_env: "DEEPSEEK_API_KEY"
    models:
      default: "deepseek-chat"
      reasoning: "deepseek-reasoner"

  doubao:
    provider: "openai"
    api_base: "https://ark.cn-beijing.volces.com/api/v3"
    api_key_env: "DOUBAO_API_KEY"
    models:
      default: "doubao-pro-32k"
      fast: "doubao-lite-32k"

# Default model routing per agent role
routing:
  manager: "openai/moonshot-v1-128k"
  researcher: "deepseek/deepseek-chat"
  writer: "openai/moonshot-v1-128k"
  reviewer: "deepseek/deepseek-reasoner"
  analyst: "deepseek/deepseek-chat"
  teacher: "openai/moonshot-v1-128k"

# Fallback chain: if primary model fails, try these in order
fallback_chain:
  - "openai/moonshot-v1-128k"
  - "deepseek/deepseek-chat"
  - "openai/doubao-pro-32k"

# Default parameters
defaults:
  temperature: 0.7
  max_tokens: 4096
  timeout: 60
